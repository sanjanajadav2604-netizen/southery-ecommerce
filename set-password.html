<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password — Southery Sentie</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-cream min-h-screen flex flex-col">
    <nav class="site-header sticky top-0 z-40 px-6 h-20 bg-cream/95 border-b border-black/5 flex items-center">
        <a href="index.html" class="font-display text-2xl text-terracotta font-bold">Southery Sentie</a>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl shadow-xl border border-black/5 p-8 md:p-12 max-w-md w-full">
            <h1 class="font-display text-3xl font-bold text-charcoal mb-2">Set your password</h1>
            <p class="text-sm text-muted mb-8">Create a password to access your order history and faster checkout.</p>

            <form id="set-password-form" class="space-y-4">
                <div>
                    <label class="text-xs font-bold uppercase tracking-wider text-muted">Email</label>
                    <input type="email" id="sp-email" required readonly
                        class="w-full mt-2 px-4 py-3 bg-gray-50 border rounded-xl text-sm">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase tracking-wider text-muted">New password</label>
                    <input type="password" id="sp-password" required minlength="8" placeholder="Minimum 8 characters"
                        class="w-full mt-2 px-4 py-3 border rounded-xl text-sm focus:border-terracotta outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold uppercase tracking-wider text-muted">Confirm password</label>
                    <input type="password" id="sp-confirm" required minlength="8"
                        class="w-full mt-2 px-4 py-3 border rounded-xl text-sm focus:border-terracotta outline-none">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-terracotta text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-charcoal transition">
                    Activate account
                </button>
            </form>
            <p id="sp-message" class="text-sm mt-4 hidden"></p>
            <a href="account.html"
                class="block text-center text-xs text-terracotta font-bold mt-6 uppercase tracking-widest">Back to sign
                in</a>
        </div>
    </main>

    <script src="js/layout.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const token = params.get('token');
        const email = params.get('email');
        const emailEl = document.getElementById('sp-email');
        const msg = document.getElementById('sp-message');

        if (email) emailEl.value = decodeURIComponent(email);
        if (!token || !email) {
            msg.textContent = 'Invalid link. Use the link from your order confirmation email.';
            msg.className = 'text-sm mt-4 text-red-600';
            msg.classList.remove('hidden');
            document.getElementById('set-password-form').querySelector('button').disabled = true;
        }

        document.getElementById('set-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('sp-password').value;
            const confirm = document.getElementById('sp-confirm').value;
            if (password !== confirm) {
                showToast('Passwords do not match.', 'error');
                return;
            }
            try {
                const data = await apiCall('/api/auth/set-password', 'POST', {
                    token,
                    email: emailEl.value,
                    password,
                });
                localStorage.setItem('southery_token', data.token);
                localStorage.setItem('southery_user', JSON.stringify(data.user));
                showToast('Account ready! Redirecting…', 'success');
                setTimeout(() => { window.location.href = 'account.html'; }, 1500);
            } catch (err) {
                showToast(err.message || 'Could not set password.', 'error');
            }
        });
    </script>
</body>

</html>
